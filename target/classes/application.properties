# ── Serveur ────────────────────────────────────────────────
server.port=8085

# ── Base de données MySQL ───────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/forage
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────
# update  → met à jour le schéma sans supprimer les données (développement)
# validate → vérifie le schéma sans le modifier (production)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Vues JSP ────────────────────────────────────────────────
# Emplacement des fichiers .jsp
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
